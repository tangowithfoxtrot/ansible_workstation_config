---
- hosts: localhost
  connection: local
  become: true
  roles:
  - kewlfft.aur

  tasks:
  - name: install packages (Debian)
    when: ansible_os_family == "Debian"
    package:
      name:
        - fish
        - htop
        - nano
        - vim-nox
        - python3-psutil
        - sshfs
        - cifs-utils
        - python3-pip
        - arc-theme
        - papirus-icon-theme
        - gnome-tweaks

  - name: remove annoying packages (Debian)
    when: ansible_os_family == "Debian"
    package:
      name:
        - cheese
        - libreoffice-common
      state: absent

  - name: install packages (Arch)
    when: ansible_os_family == "Archlinux"
    package:
      name:
        - fish
        - htop
        - nano
        - vim
        - sshfs
        - cifs-utils
        - cronie
        - python-pip
        - arc-gtk-theme
        - papirus-icon-theme
        - python-psutil
        - gnome-tweaks
        - dconf # wallpaper task dependency
        - rust  # pop-shell dependency
        - typescript  # pop-shell dependency

  - name: add AUR user
    when: ansible_os_family == "Archlinux"
    user:
      name: aur_user
      group: wheel

  - name: set up sudo for aur_user
    when: ansible_os_family == "Archlinux"
    copy:
      src: files/sudoer_aur_user
      dest: /etc/sudoers.d/aur_user
      owner: root
      group: root
      mode: 0440

  - name: install packages from AUR (Arch)
    when: ansible_os_family == 'Archlinux'
    become_user: aur_user
    aur: 
      name: 
        - pop-shell-shortcuts-git # pop-shell dependency
        - gnome-shell-extension-pop-shell
      state: present

  - name: remove annoying packages (Arch)
    when: ansible_os_family == "Archlinux"
    package:
      name:
        - libreoffice-fresh
      state: absent

  - name: enable cronie (Arch)
    when: ansible_os_family == "Archlinux"
    systemd:
      name: cronie
      enabled: yes
      state: started

  - name: copy nanorc folder
    copy:
      src: files/nano/
      dest: /home/trevor/.nano/
      remote_src: yes
      directory_mode: yes
      owner: trevor
      group: trevor

  - name: copy nanorc folder
    copy:
      src: files/nanorc
      dest: /home/trevor/.nanorc
      remote_src: yes
      owner: trevor
      group: trevor

  - name: copy wallpaper file
    copy:
      src: files/wallpaper.png
      dest: /usr/share/backgrounds/ansible-wallpaper.png
      owner: root
      group: root

  - name: set wallpaper
    become_user: trevor
    dconf:
      key: "/org/gnome/desktop/background/picture-uri"
      value: "'file:///usr/share/backgrounds/ansible-wallpaper.png'"

  - name: set wallpaper position
    become_user: trevor
    dconf:
      key: "/org/gnome/desktop/background/picture-options"
      value: "'zoom'"

  - name: copy lockscreen file
    copy:
      src: files/lockscreen.jpg
      dest: /usr/share/backgrounds/ansible-lockscreen.jpg
      owner: trevor
      group: trevor
      mode: 600

  - name: set lock screen background
    become_user: trevor
    dconf:
      key: "/org/gnome/desktop/screensaver/picture-uri"
      value: "'file:///usr/share/backgrounds/ansible-lockscreen.jpg'"

  - name: set GTK theme
    become_user: trevor
    dconf:
      key: "/org/gnome/desktop/interface/gtk-theme"
      value: "'Arc-Dark'"

  - name: set icon theme
    become_user: trevor
    dconf:
      key: "/org/gnome/desktop/interface/icon-theme"
      value: "'Papirus-Dark'"

  - name: copy .bashrc file
    copy:
      src: files/bashrc
      dest: /home/trevor/.bashrc
      owner: trevor
      group: trevor


  - name: add ansible user
    user:
      name: awx
      system: yes

  - name: set up sudo for ansible user
    copy:
      src: files/sudoer_awx
      dest: /etc/sudoers.d/awx
      owner: root
      group: root
      mode: 0440

  - name: add ansible-pull cron job
    cron:
      name: ansible auto-provision
      user: awx
      hour: "*/6"
      job: ansible-pull -o -U https://github.com/tangowithfoxtrot/ansible_workstation_config.git
